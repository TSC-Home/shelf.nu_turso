services:
  shelf:
    image: ghcr.io/tsc-home/shelf.nu_turso:latest
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:8080"
    volumes:
      - shelf_data:/data
    environment:
      NODE_ENV: production

      # -----------------------------------------------------------------------
      # Database
      # Embedded SQLite — data lives in the shelf_data volume.
      # Switch to a Turso URL + token for remote/replicated deployments.
      # -----------------------------------------------------------------------
      DATABASE_URL: file:/data/shelf.db
      DATABASE_AUTH_TOKEN: ""

      # -----------------------------------------------------------------------
      # Auth — generate both with: openssl rand -hex 32
      # -----------------------------------------------------------------------
      SESSION_SECRET: "change-me-use-a-random-32-byte-hex-string"
      INVITE_TOKEN_SECRET: "change-me-use-a-random-32-byte-hex-string"

      # -----------------------------------------------------------------------
      # Server
      # -----------------------------------------------------------------------
      SERVER_URL: "http://localhost:3000"
      APP_NAME: "Shelf"

      # -----------------------------------------------------------------------
      # Storage
      # "local" stores files inside the shelf_data volume.
      # Switch to "s3" and fill in the S3_* variables for external object storage.
      # -----------------------------------------------------------------------
      STORAGE_DRIVER: local
      UPLOAD_DIR: /data/uploads

      # S3-compatible storage (uncomment and fill in when STORAGE_DRIVER=s3):
      # S3_ENDPOINT: "https://s3.amazonaws.com"
      # S3_BUCKET: "my-shelf-bucket"
      # S3_ACCESS_KEY_ID: ""
      # S3_SECRET_ACCESS_KEY: ""
      # S3_REGION: "us-east-1"
      # S3_PUBLIC_URL: "https://cdn.example.com"
      # S3_FORCE_PATH_STYLE: "false"

      # -----------------------------------------------------------------------
      # Email — relay.voidvalue.com
      # Leave RELAY_API_KEY empty to disable outgoing email entirely.
      # -----------------------------------------------------------------------
      RELAY_API_KEY: ""
      RELAY_SMTP_KEY: ""
      SMTP_FROM: "Shelf <noreply@example.com>"
      SEND_ONBOARDING_EMAIL: "false"

      # Alternatively use any SMTP relay:
      # SMTP_HOST: "relay.voidvalue.com"
      # SMTP_PORT: "587"
      # SMTP_USER: ""
      # SMTP_PWD: ""

      # -----------------------------------------------------------------------
      # Features
      # -----------------------------------------------------------------------
      ENABLE_PREMIUM_FEATURES: "false"
      DISABLE_SIGNUP: "false"

      # -----------------------------------------------------------------------
      # Admin
      # -----------------------------------------------------------------------
      ADMIN_EMAIL: "admin@example.com"
      SUPPORT_EMAIL: "support@example.com"

      # -----------------------------------------------------------------------
      # Maps (optional)
      # -----------------------------------------------------------------------
      MAPTILER_TOKEN: ""

      # -----------------------------------------------------------------------
      # Analytics / monitoring (all optional — leave blank to disable)
      # -----------------------------------------------------------------------
      SENTRY_DSN: ""
      MICROSOFT_CLARITY_ID: ""
      CLOUDFLARE_WEB_ANALYTICS_TOKEN: ""

volumes:
  shelf_data:
